<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anh sinh viên IT store</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: #f5f5f5;
    }

    /* Khung chứa */
    .shop-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Iframe */
    .shop-frame {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Responsive fix */
    @media (max-width: 768px) {
      .shop-container {
        height: 100vh;
      }
    }
  </style>
</head>

<body>

  <div class="shop-container">
    <iframe 
      class="shop-frame"
      src="https://collshp.com/chaulht7506?view=storefront">
    </iframe>
  </div>

</body>
</html>
