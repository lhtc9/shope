<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Knox Media</title>
<link rel="icon" href="https://i.pinimg.com/736x/ea/1e/a1/ea1ea138da0be93b05a360e3d0dc7bde.jpg">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
}

/* HEADER */
header {
  background: #ff6a00;
  padding: 12px;
  position: sticky;
  top: 0;
}

.search-box {
  background: white;
  border-radius: 20px;
  padding: 10px 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.search-box input {
  border: none;
  outline: none;
  width: 100%;
  font-size: 14px;
}

/* BANNER */
.banner {
  height: 160px;
  background: linear-gradient(135deg, #ff6a00, #ff9a00);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.banner-content h2 {
  font-size: 22px;
  margin-bottom: 5px;
}

.banner-content p {
  font-size: 14px;
  margin-bottom: 10px;
  opacity: 0.9;
}

/* NÚT */
.banner-btn {
  display: inline-block;
  background: white;
  color: #ff6a00;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  text-decoration: none;
  font-weight: bold;
}

.banner-btn:hover {
  background: #ffe0cc;
}

/* CATEGORY */
.category {
  display: flex;
  overflow-x: auto;
  background: white;
  padding: 10px;
  gap: 10px;
  border-bottom: 1px solid #eee;
}

.cat-item {
  padding: 6px 12px;
  background: #00f0ff;
  border-radius: 15px;
  font-size: 12px;
  cursor: pointer;
}

.cat-item:hover {
  background: #ffe0cc;
}

.cat-item.active {
  background: linear-gradient(135deg, #00f0ff, #0088ff);
  color: white;
  box-shadow: 0 0 10px #00f0ff;
}
/* PRODUCT GRID */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

/* BADGE */
.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: #ff3b30;
  color: white;
  font-size: 10px;
  padding: 3px 5px;
  border-radius: 5px;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* INFO */
.info {
  padding: 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.title {
  font-size: 13px;
  color: #333;
  line-height: 1.4;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;

  overflow: hidden;
}

/* PRICE */
.price {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* giá mới */
.price .new {
  color: #ff6a00;
  font-size: 18px;
  font-weight: bold;
}

/* giá cũ */
.price .old {
  color: #999;
  font-size: 13px;
  text-decoration: line-through;
}

/* BUTTON GROUP */
.btn-group {
  display: flex;
  gap: 5px;
}

/* BUTTON GROUP */
.btn-group {
  margin-top: auto;
}

/* BUTTON */
.btn {
  flex: 1;
  text-align: center;
  padding: 6px;
  font-size: 12px;
  border-radius: 6px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}

.tiktok {
  background: linear-gradient(135deg, #00f0ff, #0088ff);
  color: white;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
}

/* HOVER */
.btn:hover {
  opacity: 0.9;
}

/* PRODUCT GRID */
.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* mặc định mobile */
  gap: 10px;
  padding: 10px;
}

/* Tablet */
@media (min-width: 600px) {
  .container {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* Laptop */
@media (min-width: 992px) {
  .container {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* Màn hình lớn */
@media (min-width: 1200px) {
  .container {
    grid-template-columns: repeat(5, 1fr);
  }
}

#backToTop {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff6a00;
  color: white;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  font-size: 18px;
  cursor: pointer;
  display:block;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 999;
}

#backToTop:hover {
  background: #e65c00;
}

/* HEADER SHOP STYLE */
.shop-header {
  height: 180px;
  background: url('https://i.pinimg.com/736x/85/53/1b/85531bc1547a1cd5cf75414371dc8e90.jpg') center/cover no-repeat;
  position: relative;
  color: white;
}

.shop-info h2 {
  text-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

.overlay {
  background:transparent;
  height: 100%;
  padding: 10px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  font-size: 20px;
}

/* SHOP INFO */
.shop-info {
  text-align: center;
}

.avatar {
  width: 55px;
  height: 55px;
  border-radius: 50%;
  border: 2px solid white;
  margin-bottom: 5px;
}

/* SEARCH */
.shop-header .search-box {
  background: white;
  border-radius: 20px;
  padding: 8px 12px;
}

.shop-header input {
  width: 100%;
  border: none;
  outline: none;
}

#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* đảm bảo nội dung nằm trên hiệu ứng */
header, .category, .container, #backToTop {
  position: relative;
  z-index: 1;
}
</style>

</head>

const container = document.getElementById("productList");

function render(list) {
  container.innerHTML = "";
  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${p.hot ? '<div class="badge">HOT</div>' : ''}
      <img src="${p.img}">
      <div class="info">
        <div class="title">${p.name}</div>
        <div class="price">
</div>
        <div class="btn-group">
          <a href="${p.linkTikTok}" target="_blank" class="btn tiktok">Xem giá hôm nay</a>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

function filter(cat) {
  if (cat === "all") return render(products);
  render(products.filter(p => p.category === cat));
}

function searchProduct(keyword) {
  const result = products.filter(p =>
    p.name.toLowerCase().includes(keyword.toLowerCase())
  );
  render(result);
}

render(products);
const btn = document.getElementById("backToTop");

// hiện nút khi scroll xuống
window.onscroll = function () {
  if (document.documentElement.scrollTop > 200) {
    btn.style.display = "block";
  } else {
    btn.style.display = "none";
  }
};

// click → lên đầu trang
btn.onclick = function () {

};
